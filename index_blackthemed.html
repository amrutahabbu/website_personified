<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amruta Habbu — Software Engineer Senior</title>
  <meta name="description" content="Amruta Habbu — Senior Software Engineer. Building systems that scale and teams that thrive." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0f0c;
      --bg2:     #111710;
      --bg3:     #182018;
      --surface: #141a14;
      --border:  rgba(80,160,100,0.12);
      --border2: rgba(80,160,100,0.22);
      --text:    #e2ede6;
      --muted:   #6a8c74;
      --accent:  #5ec47a;
      --accent2: #3d9458;
      --soft:    #2d5c3a;
      --serif:   'DM Serif Display', serif;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .site { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 60px;
      position: sticky; top: 0; background: var(--bg); z-index: 100;
    }
    .nav-logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.06em; cursor: pointer; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; font-family: var(--mono); letter-spacing: 0.03em; transition: color 0.2s; cursor: pointer; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); font-weight: 500; }
    .hamburger { display: none; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }

    section { display: none; animation: fadeIn 0.22s ease; }
    section.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* HERO */
    .hero { padding: 8px 0 64px; }
    .hero-eyebrow { font-family: var(--mono); font-size: 12px; color: var(--accent2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
    .hero-eyebrow::before { content: ''; display: inline-block; width: 28px; height: 1.5px; background: var(--soft); border-radius: 2px; }
    .hero h1 { font-family: var(--serif); font-size: clamp(40px, 7vw, 62px); line-height: 1.08; color: var(--text); }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-sub { font-size: 16px; color: var(--muted); line-height: 1.7; max-width: 520px; margin: 22px 0 38px; }
    .hero-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; padding: 5px 13px; border: 1px solid var(--border2); border-radius: 20px; color: var(--muted); background: var(--surface); }
    .tag.hi { border-color: var(--accent2); color: var(--accent); background: var(--bg2); }

    .section-label { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--bg3); border-radius: 1px; }

    /* ABOUT */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .about-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
    .about-card h3 { font-family: var(--serif); font-size: 19px; color: var(--text); margin-bottom: 10px; }
    .about-card p { font-size: 14px; color: var(--muted); line-height: 1.75; }
    .about-card.wide { grid-column: 1 / -1; }
    .about-values { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .value-chip { font-family: var(--mono); font-size: 11px; padding: 4px 11px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; color: var(--accent2); }

    /* WORK */
    .work-list { display: flex; flex-direction: column; }
    .work-item { display: grid; grid-template-columns: 120px 1fr; gap: 24px; padding: 28px 0; border-bottom: 1px solid var(--border); }
    .work-item:first-child { border-top: 1px solid var(--border); }
    .work-date { font-family: var(--mono); font-size: 11px; color: var(--soft); padding-top: 4px; letter-spacing: 0.04em; }
    .work-role { font-family: var(--serif); font-size: 18px; color: var(--text); margin-bottom: 3px; }
    .work-company { font-family: var(--mono); font-size: 12px; color: var(--accent2); margin-bottom: 10px; letter-spacing: 0.04em; }
    .work-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; }
    .work-skills { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-pill { font-family: var(--mono); font-size: 10px; padding: 3px 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); letter-spacing: 0.03em; }

    /* PROJECTS */
    .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; transition: border-color 0.2s, transform 0.15s; }
    .project-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .project-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
    .project-title { font-family: var(--serif); font-size: 17px; color: var(--text); }
    .project-status { font-family: var(--mono); font-size: 10px; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; }
    .status-active   { background: rgba(94,196,122,0.12); color: #5ec47a; border: 1px solid rgba(94,196,122,0.28); }
    .status-building { background: rgba(220,170,80,0.1);  color: #c49a3a; border: 1px solid rgba(220,170,80,0.25); }
    .status-idea     { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }
    .project-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 14px; }
    .project-tech { display: flex; flex-wrap: wrap; gap: 6px; }

    /* INTERESTS */
    .interests-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .interest-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
    .interest-icon { font-size: 22px; margin-bottom: 10px; display: block; }
    .interest-name { font-family: var(--serif); font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .interest-desc { font-size: 12px; color: var(--muted); line-height: 1.65; }

    /* WRITING */
    .writing-list { display: flex; flex-direction: column; }
    .writing-item { padding: 22px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .writing-item:first-child { border-top: 1px solid var(--border); }
    .writing-title { font-family: var(--serif); font-size: 17px; color: var(--text); margin-bottom: 6px; cursor: pointer; transition: color 0.2s; }
    .writing-title:hover { color: var(--accent); }
    .writing-meta { font-family: var(--mono); font-size: 11px; color: var(--soft); letter-spacing: 0.04em; }
    .writing-date { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* CONTACT */
    .contact-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .contact-intro h2 { font-family: var(--serif); font-size: 30px; color: var(--text); line-height: 1.25; margin-bottom: 14px; }
    .contact-intro p { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 24px; }
    .contact-links { display: flex; flex-direction: column; gap: 12px; }
    .contact-link { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .contact-link:hover { color: var(--accent); }
    .contact-link i { font-size: 16px; color: var(--soft); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-family: var(--sans); font-size: 14px; padding: 10px 13px;
      outline: none; transition: border-color 0.2s; appearance: none;
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--soft); }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(94,196,122,0.08); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .btn-primary { background: var(--accent2); color: #0a0f0c; border: none; border-radius: 8px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; padding: 12px 24px; cursor: pointer; width: 100%; text-transform: uppercase; transition: background 0.2s, transform 0.1s; }
    .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }

    footer { border-top: 1px solid var(--border); margin-top: 64px; padding-top: 24px; display: flex; justify-content: space-between; align-items: center; }
    .footer-copy, .footer-note { font-family: var(--mono); font-size: 11px; color: var(--soft); }

    @media (max-width: 640px) {
      nav { flex-wrap: wrap; gap: 12px; }
      .nav-links { display: none; flex-direction: column; width: 100%; gap: 16px; padding: 16px 0; }
      .nav-links.open { display: flex; }
      .hamburger { display: block; }
      .about-grid, .projects-grid, .contact-wrap { grid-template-columns: 1fr; }
      .about-card.wide { grid-column: 1; }
      .interests-grid { grid-template-columns: 1fr 1fr; }
      .work-item { grid-template-columns: 1fr; gap: 4px; }
      footer { flex-direction: column; gap: 8px; text-align: center; }
    }
    @media (max-width: 400px) { .interests-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<script>
function pill(t) { return `<span class="skill-pill">${t}</span>`; }
function statusLabel(s) {
  const m = { active:["status-active","active"], building:["status-building","building"], idea:["status-idea","idea stage"] };
  const [cls,lbl] = m[s]||m.idea;
  return `<span class="project-status ${cls}">${lbl}</span>`;
}

  document.getElementById('about').innerHTML = `
    <div class="hero">
      <div class="hero-eyebrow">${c.title}</div>
      <h1>${c.name.first}<br><em>${c.name.last}</em></h1>
      <p class="hero-sub">${c.tagline}</p>

    <div class="section-label">about me</div>

}

}

function show(id) {
  document.querySelectorAll('section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  document.getElementById(id).classList.add('visible');
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('nav-links').classList.remove('open');
  window.scrollTo({ top:0, behavior:'smooth' });
}

document.getElementById('hamburger').addEventListener('click', ()=>{
  document.getElementById('nav-links').classList.toggle('open');
});

function handleSend() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const msg   = document.getElementById('f-msg').value.trim();
  const btn   = document.getElementById('send-btn');
  if (!name||!email||!msg) {
    btn.textContent='please fill in all fields';
    btn.style.background='#2d5c3a';
    setTimeout(()=>{ btn.textContent='send message →'; btn.style.background=''; },2500);
    return;
  }
  btn.textContent='message sent ✓';
  btn.style.background='#5ec47a';
  btn.style.color='#0a0f0c';
  setTimeout(()=>{ btn.textContent='send message →'; btn.style.background=''; btn.style.color=''; },3500);
}

renderAbout(); renderWork(); renderProjects();
renderInterests(); renderWriting(); renderContact();
</script>
