    .hero-eyebrow { font-family: var(--mono); font-size: 12px; color: var(--accent2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }

    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-sub { font-size: 16px; color: var(--muted); line-height: 1.7; max-width: 520px; margin: 22px 0 38px; }
    .hero-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; padding: 5px 13px; border: 1px solid var(--border2); border-radius: 20px; color: var(--muted); background: var(--surface); }
    .tag.hi { border-color: var(--accent2); color: var(--accent); background: var(--bg2); }

    .section-label { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; }

    .about-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
    .about-card h3 { font-family: var(--serif); font-size: 19px; color: var(--text); margin-bottom: 10px; }
    .about-card p { font-size: 14px; color: var(--muted); line-height: 1.75; }
    .about-card.wide { grid-column: 1 / -1; }
    .about-values { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .value-chip { font-family: var(--mono); font-size: 11px; padding: 4px 11px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; color: var(--accent2); }

    /* WORK */

    .work-item:first-child { border-top: 1px solid var(--border); }
    .work-date { font-family: var(--mono); font-size: 11px; color: var(--soft); padding-top: 4px; letter-spacing: 0.04em; }
    .work-role { font-family: var(--serif); font-size: 18px; color: var(--text); margin-bottom: 3px; }
    .work-company { font-family: var(--mono); font-size: 12px; color: var(--accent2); margin-bottom: 10px; letter-spacing: 0.04em; }

<div class="site">
  <nav>
    <span class="nav-logo" onclick="show('about')" id="site-logo"></span>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu"><i class="ti ti-menu-2"></i></button>
    <ul class="nav-links" id="nav-links">
      <li><a onclick="show('about')"     id="nav-about"     class="active">about</a></li>
      <li><a onclick="show('work')"      id="nav-work">work</a></li>
      <li><a onclick="show('growth')"    id="nav-growth">growth</a></li>
      <li><a onclick="show('projects')"  id="nav-projects">projects</a></li>
      <li><a onclick="show('interests')" id="nav-interests">interests</a></li>
      <li><a onclick="show('writing')"   id="nav-writing">writing</a></li>
      <li><a onclick="show('contact')"   id="nav-contact">contact</a></li>
    </ul>
  </nav>

  <section id="about" class="visible"></section>
  <section id="work"></section>
  <section id="growth"></section>
  <section id="projects"></section>
  <section id="interests"></section>
  <section id="writing"></section>
  <section id="contact"></section>

  <footer>
    <div class="footer-copy" id="footer-copy"></div>
    <div class="footer-note">built with intention, not templates.</div>
  </footer>
</div>

<script>
function pill(t) { return `<span class="skill-pill">${t}</span>`; }
function statusLabel(s) {
  const m = { active:["status-active","active"], building:["status-building","building"], idea:["status-idea","idea stage"] };
  const [cls,lbl] = m[s]||m.idea;
  return `<span class="project-status ${cls}">${lbl}</span>`;
}

function renderAbout() {
  const c = CONFIG;
  document.getElementById('site-logo').textContent = c.name.first.toLowerCase()+'.dev';
  document.getElementById('footer-copy').textContent = `© ${new Date().getFullYear()} ${c.name.first} ${c.name.last}`;
  document.getElementById('about').innerHTML = `
    <div class="hero">
      <div class="hero-eyebrow">${c.title}</div>
      <h1>${c.name.first}<br><em>${c.name.last}</em></h1>
      <p class="hero-sub">${c.tagline}</p>
      <div class="hero-tags">
        <span class="tag hi">${c.openTo}</span>
        ${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>
    <div class="section-label">about me</div>
    <div class="about-grid">
      <div class="about-card wide">
        <h3>The Long Version</h3>
        ${c.about.long.split('\n\n').map(p=>`<p style="margin-bottom:12px">${p}</p>`).join('')}
      </div>
      <div class="about-card">
        <h3>How I Work</h3>
        <ul style="margin:0;padding-left:18px;color:var(--muted);font-size:14px;line-height:2">
          ${c.about.howIWork.split('. ').filter(Boolean).map(s=>`<li>${s.replace(/\.$/,'')}</li>`).join('')}
        </ul>
      </div>
      <div class="about-card">
        <h3>What I Value</h3>
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:10px">
          ${c.about.valuesDetail.map(v=>`
            <div style="display:flex;gap:10px;align-items:flex-start">
              <span style="font-size:18px;line-height:1.4">${v.icon}</span>
              <div>
                <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px">${v.label}</div>
                <div style="font-size:13px;color:var(--muted);line-height:1.6">${v.desc}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div class="about-card wide" style="background:transparent;border-style:dashed;text-align:center">
        <p style="font-size:14px;color:var(--muted);line-height:1.8;font-style:italic">${c.about.footer}</p>
      </div>
    </div>`;
}

function renderWork() {
  document.getElementById('work').innerHTML = `
    <div class="section-label">experience</div>
    <div class="work-list">
      ${CONFIG.work.map(w=>`
        <div class="work-item">
          <div class="work-date">${w.date}</div>
          <div>
            <div class="work-role">${w.role}</div>
            <div class="work-company">// ${w.company}</div>
            <p class="work-desc">${w.desc}</p>
            <div class="work-skills">${w.skills.map(pill).join('')}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="work-growth-link">
      <a onclick="show('growth')">see how I grew into each of these roles →</a>
    </div>`;
}

function renderGrowth() {
  document.getElementById('growth').innerHTML = `
    <div class="section-label">growth curve</div>
    <div style="background:var(--surface);border:1px solid var(--border2);border-left:3px solid var(--accent2);border-radius:10px;padding:20px 24px;margin-bottom:36px;max-width:680px">
      <p style="font-size:13px;color:var(--muted);line-height:1.85">
        You'll notice I'm open to both Engineering Manager and Senior/Lead Engineer roles. That's because the work I've done has always lived at the intersection of the two — shipping production systems while shaping the people and processes around them. The designation matters less to me than the scope: am I solving meaningful problems, growing alongside a strong team, and building things that last? That's what I'm looking for. The rest tends to follow.
      </p>
    </div>
    <p class="growth-intro">Titles tell you the destination. This page shows the climb — how scope expanded, what I took on before I was asked, and where each chapter ended relative to where it started. Two companies, one consistent pattern: arrive, deliver, expand, lead.</p>
    ${CONFIG.growth.map((company, ci) => `
      <div class="growth-company-block">
        <div class="growth-company-header">
          <span class="growth-company-name">${company.company}</span>
          <span class="growth-company-tenure">${company.tenure}</span>
        </div>
        <div class="growth-milestones">
          ${company.milestones.map((m, mi) => `
            <div class="growth-milestone">
              <div class="growth-ms-time">${m.time}</div>
              <div class="growth-ms-spine">
                <div class="growth-ms-dot${m.lit ? ' lit' : ''}"></div>
                <div class="growth-ms-line"></div>
              </div>
              <div class="growth-ms-body">
                <div class="growth-ms-title">${m.title}</div>
                <div class="growth-ms-desc">${m.desc}</div>
                <div class="growth-ms-pills">${m.pills.map(pill).join('')}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
      ${ci < CONFIG.growth.length - 1 ? '<hr class="growth-divider">' : ''}`).join('')}
    <div class="growth-nav-cta">
      <a class="growth-nav-btn" onclick="show('work')">← back to experience</a>
      <a class="growth-nav-btn" onclick="show('projects')">see what I build outside work →</a>
    </div>`;
}

function renderProjects() {
  document.getElementById('projects').innerHTML = `
    <div class="section-label">pet projects</div>
    <div class="projects-grid">
      ${CONFIG.projects.map(p=>`
        <div class="project-card" ${p.link?`onclick="window.open('${p.link}')" style="cursor:pointer"`:''}>
          <div class="project-header">
            <div class="project-title">${p.title}</div>
            ${statusLabel(p.status)}
          </div>
          <p class="project-desc">${p.desc}</p>
          <div class="project-tech">${p.tech.map(pill).join('')}</div>
        </div>`).join('')}
    </div>`;
}

function renderInterests() {
  document.getElementById('interests').innerHTML = `
    <div class="section-label">interests</div>
    <div class="interests-grid">
      ${CONFIG.interests.map(i=>`
        <div class="interest-card">
          <i class="ti ${i.icon} interest-icon" aria-hidden="true" style="color:${i.color}"></i>
          <div class="interest-name">${i.name}</div>
          <p class="interest-desc">${i.desc}</p>
        </div>`).join('')}
    </div>`;
}

function renderWriting() {
  document.getElementById('writing').innerHTML = `
    <div class="section-label">writing</div>
    <div class="writing-list">
      ${CONFIG.writing.map(w=>`
        <div class="writing-item">
          <div>
            <div class="writing-title" ${w.url?`onclick="window.open('${w.url}')"`:''}>${w.title}</div>
            <div class="writing-meta">${w.tag} · ${w.readTime}</div>
          </div>
          <div class="writing-date">${w.date}</div>
        </div>`).join('')}
    </div>
    <p style="font-family:var(--mono);font-size:11px;color:var(--soft);margin-top:28px;">← more posts coming soon. this is a living section.</p>`;
}

function renderContact() {
  const c = CONFIG.contact;
  document.getElementById('contact').innerHTML = `
    <div class="contact-wrap">
      <div class="contact-intro">
        <h2>${c.headline}</h2>
        <p>${c.intro}</p>
        <div class="contact-links">
          <a href="https://${c.github}"   class="contact-link" target="_blank" rel="noopener"><i class="ti ti-brand-github" aria-hidden="true"></i>${c.github}</a>
          <a href="https://${c.linkedin}" class="contact-link" target="_blank" rel="noopener"><i class="ti ti-brand-linkedin" aria-hidden="true"></i>${c.linkedin}</a>
          <a href="mailto:${c.email}"     class="contact-link"><i class="ti ti-mail" aria-hidden="true"></i>${c.email}</a>
        </div>
      </div>
      <div>
        <div class="form-group"><label for="f-name">name</label><input id="f-name" type="text" placeholder="Your name" /></div>
        <div class="form-group"><label for="f-email">email</label><input id="f-email" type="email" placeholder="your@email.com" /></div>
        <div class="form-group"><label for="f-topic">what's this about</label>
          <select id="f-topic">${c.topics.map(t=>`<option>${t}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label for="f-msg">message</label><textarea id="f-msg" placeholder="What's on your mind?"></textarea></div>
        <button class="btn-primary" id="send-btn" onclick="handleSend()">send message →</button>
      </div>
    </div>`;
}

function show(id) {
  document.querySelectorAll('section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  document.getElementById(id).classList.add('visible');
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('nav-links').classList.remove('open');
  window.scrollTo({ top:0, behavior:'smooth' });
}

document.getElementById('hamburger').addEventListener('click', ()=>{
  document.getElementById('nav-links').classList.toggle('open');
});

function handleSend() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const msg   = document.getElementById('f-msg').value.trim();
  const btn   = document.getElementById('send-btn');
  if (!name||!email||!msg) {
    btn.textContent='please fill in all fields';
    btn.style.background='#2d5c3a';
    setTimeout(()=>{ btn.textContent='send message →'; btn.style.background=''; },2500);
    return;
  }
  btn.textContent='message sent ✓';
  btn.style.background='#5ec47a';
  btn.style.color='#0a0f0c';
  setTimeout(()=>{ btn.textContent='send message →'; btn.style.background=''; btn.style.color=''; },3500);
}

renderAbout(); renderWork(); renderGrowth(); renderProjects();
renderInterests(); renderWriting(); renderContact();
</script>
</body>
</html>
